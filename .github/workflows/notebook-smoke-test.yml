name: Notebook Smoke Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify sample dataset exists
        run: python scripts/verify_course.py

      - name: Execute representative Week 1 notebook
        run: |
          jupyter nbconvert \
            --to notebook \
            --execute notebooks/week-01/01_data_ai_evidence_global_decision_making.ipynb \
            --output week-01-executed.ipynb \
            --output-dir /tmp \
            --ExecutePreprocessor.timeout=120
